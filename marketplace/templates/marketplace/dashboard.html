<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketplace</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
      }

      header {
        background: #0f172a;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      header a {
        color: #cbd5f5;
        text-decoration: none;
        font-weight: 600;
      }

      main {
        padding: 2rem;
      }

      .marketplace {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1rem;
      }

      .card {
        background: #ffffff;
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      h2 {
        margin-top: 0;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        display: block;
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 0.65rem;
        border: 1px solid #cbd5f5;
        padding: 0.65rem;
        margin-bottom: 0.8rem;
        background: #f8fafc;
      }

      textarea {
        min-height: 90px;
      }

      button {
        background: #6366f1;
        color: white;
        border: none;
        padding: 0.7rem 1.3rem;
        border-radius: 0.75rem;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      li {
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #e2e8f0;
      }

      .status {
        color: #0f172a;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Marketplace</h1>
      <a href="/seo/dashboard/">SEO</a>
      <a href="/accounts/social/dashboard/">Social</a>
    </header>
    <main>
      <div id="marketplace-app"></div>
    </main>

    {% verbatim %}
    <script type="text/babel">
      const { useState, useEffect } = React;
      const ROOT = '/marketplace/api/products/';

      function MarketplaceApp() {
        const [products, setProducts] = useState([]);
        const [form, setForm] = useState({
          name: '',
          kind: 'product',
          price: '',
          description: '',
        });
        const [status, setStatus] = useState('');
        const [busy, setBusy] = useState(false);

        const loadProducts = () =>
          fetch(ROOT)
            .then((response) => response.json())
            .then((data) => setProducts(data.products || []))
            .catch(() => setStatus('Unable to load entries.'));

        useEffect(() => {
          loadProducts();
        }, []);

        const handleCreate = () => {
          if (!form.name || !form.price) {
            setStatus('Name and price are required.');
            return;
          }
          setBusy(true);
          fetch(ROOT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '',
            },
            body: JSON.stringify(form),
          })
            .then((response) => {
              if (!response.ok) throw new Error('Failed');
              return response.json();
            })
            .then(() => {
              setForm({ name: '', kind: 'product', price: '', description: '' });
              loadProducts();
            })
            .catch(() => setStatus('Unable to save item.'))
            .finally(() => setBusy(false));
        };

        const totalRevenue = products.reduce((sum, product) => sum + parseFloat(product.revenue || 0), 0);
        const highest = products.reduce((best, product) => {
          if (!best || parseFloat(product.revenue || 0) > parseFloat(best.revenue || 0)) {
            return product;
          }
          return best;
        }, null);

        return (
          <>
            <section className="card" style={{ margin: '0 0 1rem 0' }}>
              <h2>Performance recap</h2>
              <p className="status">
                {products.length
                  ? `${products.length} items · $${totalRevenue.toFixed(2)} total revenue`
                  : 'No products tracked yet.'}
              </p>
              {highest && (
                <p>
                  Top performer: <strong>{highest.name}</strong> · Revenue: ${highest.revenue} · Sales: {highest.sales_count}
                </p>
              )}
            </section>
            <div className="marketplace">
            <section className="card">
              <h2>Create product/service</h2>
              <label>Name</label>
              <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
              <label>Kind</label>
              <select value={form.kind} onChange={(e) => setForm({ ...form, kind: e.target.value })}>
                <option value="product">Product</option>
                <option value="service">Service</option>
              </select>
              <label>Price</label>
              <input
                type="number"
                step="0.01"
                value={form.price}
                onChange={(e) => setForm({ ...form, price: e.target.value })}
              />
              <label>Description</label>
              <textarea
                value={form.description}
                onChange={(e) => setForm({ ...form, description: e.target.value })}
              />
              <div className="form-actions">
                <button disabled={busy} onClick={handleCreate}>
                  {busy ? 'Saving…' : 'Create'}
                </button>
              </div>
              {status && <p className="status">{status}</p>}
            </section>
            <section className="card">
              <h2>Products & services</h2>
              <p className="status">{products.length ? `${products.length} tracked` : 'No items yet'}</p>
              <ul>
                {products.map((product) => (
                  <li key={product.id}>
                    <strong>{product.name}</strong> · {product.kind}
                    <div>
                      Price: ${product.price} · Sales: {product.sales_count} · Revenue: ${product.revenue}
                    </div>
                  </li>
                ))}
              </ul>
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('marketplace-app')).render(<MarketplaceApp />);
    </script>
    {% endverbatim %}
  </body>
</html>

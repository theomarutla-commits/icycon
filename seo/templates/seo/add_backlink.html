{% extends "accounts/base.html" %}

{% block title %}Add Backlink{% endblock %}

{% block content %}
  <h1>Add Backlink</h1>

  {% if success %}
    <div class="alert alert-success">
      Backlink saved successfully.
    </div>
  {% endif %}

  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save backlink</button>
  </form>

  <p class="mt-3">
    Use the form above to register a backlink for any registered page.
  </p>
{% endblock %}

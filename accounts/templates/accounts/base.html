<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Icycon{% endblock %}</title>
    <style>
      :root {
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #0f172a;
        background: #f5f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background-color: #f5f7fb;
      }


      .chat-badge {
        position: fixed;
        right: 1.5rem;
        bottom: 1.5rem;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: #fff;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.3);
        display: flex;
        flex-direction: column;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .chat-badge small {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .chat-badge:hover {
        transform: translateY(-6px);
        box-shadow: 0 30px 50px rgba(15, 23, 42, 0.4);
      }

      @keyframes float {
        0% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(0, 10px);
        }
        100% {
          transform: translate(0, 0);
        }
      }

      main {
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
      }

      .card {
        background: #fff;
        border-radius: 1rem;
        padding: 2rem;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.1);
      }

      .messages {
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .messages p {
        margin: 0;
        padding: 0.75rem 1rem;
        border-radius: 0.6rem;
      }

      .messages .success {
        background: #d1fae5;
        color: #0f5132;
      }

      .messages .info {
        background: #e0f2fe;
        color: #0f172a;
      }

      .messages .error {
        background: #fee2e2;
        color: #7f1d1d;
      }

      footer {
        text-align: center;
        padding: 1rem;
        color: #475569;
        font-size: 0.85rem;
      }

      .form-grid {
        display: grid;
        gap: 1rem;
      }

      label {
        font-weight: 600;
        display: block;
        margin-bottom: 0.25rem;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        border-radius: 0.6rem;
        border: 1px solid #cbd5f5;
        font-size: 1rem;
      }

      button {
        background: #0d3b8f;
        border: none;
        color: #fff;
        padding: 0.85rem 1.5rem;
        border-radius: 0.75rem;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #15227c;
      }

    </style>
  </head>
  <body>
    {% include 'shared/dashboard_header.html' %}

    <main>
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <p class="{{ message.tags }}">{{ message }}</p>
        {% endfor %}
      </div>
      {% endif %}

      <div class="card">{% block content %}{% endblock %}</div>
    </main>

    <footer>Built on Django’s auth + React SEO tooling.</footer>
    <a href="https://vapi.ai" target="_blank" class="chat-badge">
      <span>Vapi AI</span>
      <small>Chat support</small>
    </a>
  </body>
</html>
